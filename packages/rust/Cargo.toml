[package]
name = "dcr-reporter"
version = "0.1.0"
edition = "2021"
authors = ["your name"]
description = "dependency-cruiser reporter"

[lib]
name = "dcr_reporter"
path = "src/lib.rs"

[[bin]]
name = "dcr-aggregate"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
clap = { version = "4.5", features = ["derive"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

[profile.dev]
opt-level = 0
debug = true